<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transporte Maritímo</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <!-- Navbar -->
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold d-flex align-items-center" href="#">
    
            <img src="logo.png"
                alt="Logo AGA"
                width="45"
                class="me-2">

                AGENCIA DE GESTION ADUANERA AGA S.A.

            </a>
        </div>
    </nav>

    <!-- Encabezado -->
    <section class="py-5 bg-light">
        <div class="container">

            <h1 class="text-center text-primary fw-bold mb-5">
                Transporte Marítimo
            </h1>

        <!-- FORMULARIO -->
                            
                                <form action="https://formspree.io/f/mqejydke" method="POST">

                                <!-- Desactivar captcha -->
                                <input type="hidden" name="_captcha" value="false">

                                <!-- Asunto -->
                                <input type="hidden" name="_subject" value="Solicitud Cotización Marítima">

                                <!-- Redirección -->
                                <input type="hidden" name="_next" value="gracias.html">

                                <div class="mb-3">
                                    <label class="form-label">
                                        País de Origen
                                    </label>

                                    <input type="text"
                                           name="pais_origen"
                                           class="form-control"
                                           required>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">
                                        País de Destino
                                    </label>

                                    <input type="text"
                                           name="pais_destino"
                                           class="form-control"
                                           required>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">
                                        Tipo de Mercadería
                                    </label>

                                    <input type="text"
                                           name="mercaderia"
                                           class="form-control"
                                           required>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">
                                        Peso
                                    </label>

                                    <input type="text"
                                           name="peso"
                                           class="form-control"
                                           placeholder="Ejemplo: 250 kg"
                                           required>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">
                                        Cubicaje
                                    </label>

                                    <input type="text"
                                           name="cubicaje"
                                           class="form-control"
                                           placeholder="Ejemplo: 10 cbm"
                                           required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">
                                        Embalaje
                                    </label>

                                    <input type="text"
                                           name="embalaje"
                                           class="form-control"
                                           placeholder="A piso o Entarimado"
                                           required>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">
                                        Correo del Cliente
                                    </label>

                                    <input type="email"
                                           name="correo_cliente"
                                           class="form-control"
                                           required>
                                </div>

                                <div class="text-center">
                            <button type="submit"
                                    class="btn btn-primary btn-lg">
                                Enviar Solicitud
                            </button>
                        </div>

                    </form>

                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center py-3">
        <p class="mb-0">
            © 2026 AGA S,A. - Todos los derechos reservados.
        </p>
    </footer>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
